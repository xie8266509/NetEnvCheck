name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and package
        run: Scripts/package-app.sh

      - name: Create zip
        run: ditto -c -k --keepParent dist/NetEnvCheck.app NetEnvCheck.app.zip

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" NetEnvCheck.app.zip --clobber
          else
            gh release create "${GITHUB_REF_NAME}" NetEnvCheck.app.zip \
              --title "NetEnvCheck ${GITHUB_REF_NAME}" \
              --notes "Automated release for ${GITHUB_REF_NAME}."
          fi
